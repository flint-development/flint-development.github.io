<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Seite in Arbeit – FLINT Development</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(to bottom, #ffffff, #e0e0e0);
                color: #333;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                text-align: center;
            }

            .container {
                padding: 40px;
                border-radius: 12px;
                background: white;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }

            .emoji {
                font-size: 48px;
                margin-bottom: 20px;
                animation: bounce 2s infinite;
            }

            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }

            h1 {
                font-size: 32px;
                margin-bottom: 10px;
            }

            .dots span {
                opacity: 0;
                animation: blink 1.5s infinite;
            }

            .dots span:nth-child(1) {
                animation-delay: 0s;
            }

            .dots span:nth-child(2) {
                animation-delay: 0.3s;
            }

            .dots span:nth-child(3) {
                animation-delay: 0.6s;
            }

            .button {
                background: linear-gradient(to bottom, #ffffff, #cccccc);
                border: 1px solid #999;
                border-radius: 8px;
                color: #333;
                font-size: 16px;
                padding: 10px 20px;
                text-decoration: none;
                text-shadow: 0 1px 0 #fff;
                display: inline-block;
                margin-top: 20px;
            }
        
            .button:hover {
                background: linear-gradient(to bottom, #eeeeee, #bbbbbb);
            }

            @keyframes blink {
                0% { opacity: 0; }
                50% { opacity: 1; }
                100% { opacity: 0; }
            }

            p {
                font-size: 18px;
                margin-bottom: 20px;
            }

            a {
                color: #007aff;
                text-decoration: none;
                font-weight: bold;
            }

            a:hover {
                color: #005bb5;
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="emoji">🚧</div>
            <h1>Diese Seite ist noch in Arbeit<span class="dots"><span>.</span><span>.</span><span>.</span></span></h1>
            <p>Wir arbeiten fleißig daran, diesen Bereich zu verbessern.<br>Schau bald wieder vorbei!</p>
            <a href="index.html" class="button">Zurück zur Startseite</a>
        </div>
    </body>
</html>
